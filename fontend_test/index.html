<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API SEAL Hackathon</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        button.btn-success { background-color: #28a745; }
        button.btn-success:hover { background-color: #218838; }
        .result-box { margin-top: 20px; padding: 10px; background-color: #e9ecef; border-radius: 4px; word-wrap: break-word; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔑 Đăng Nhập Hệ Thống</h2>
    
    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Nhập email của bạn (vd: an.test@fpt.edu.vn)">
    </div>
    <div class="form-group">
        <label for="password">Mật khẩu:</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu (vd: 123)">
    </div>
    
    <button onclick="login()">Đăng Nhập (Lấy Token)</button>

    <button class="btn-success" onclick="getMe()">Lấy Thông Tin Cá Nhân (/me)</button>

    <div class="result-box">
        <strong>Trạng thái:</strong> <span id="statusMessage" style="color: blue;">Chưa đăng nhập</span><br><br>
        <strong>Console:</strong>
        <pre id="consoleOutput" style="white-space: pre-wrap; color: #333;">...</pre>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8080/api/auth";

    // 1. Hàm xử lý Đăng nhập
    async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const statusMsg = document.getElementById("statusMessage");
        const consoleOut = document.getElementById("consoleOutput");

        statusMsg.innerText = "Đang xử lý...";
        consoleOut.innerText = "";

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email: email, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                // Đăng nhập thành công -> Lưu Token vào LocalStorage của trình duyệt
                localStorage.setItem("accessToken", data.accessToken);
                statusMsg.innerText = "✅ Đăng nhập thành công! Đã lưu Token.";
                statusMsg.style.color = "green";
                consoleOut.innerText = "AccessToken: \n" + data.accessToken;
            } else {
                // Sai tài khoản hoặc mật khẩu
                statusMsg.innerText = "❌ Lỗi đăng nhập!";
                statusMsg.style.color = "red";
                consoleOut.innerText = JSON.stringify(data, null, 2);
            }
        } catch (error) {
            statusMsg.innerText = "❌ Lỗi kết nối đến Backend!";
            statusMsg.style.color = "red";
            consoleOut.innerText = "Vui lòng kiểm tra xem Spring Boot đã chạy ở cổng 8080 chưa.\nLỗi: " + error;
        }
    }

    // 2. Hàm gọi API lấy thông tin Current User (Bắt buộc phải đeo Token)
    async function getMe() {
        const token = localStorage.getItem("accessToken");
        const statusMsg = document.getElementById("statusMessage");
        const consoleOut = document.getElementById("consoleOutput");

        if (!token) {
            alert("Bạn chưa có Token! Vui lòng Đăng nhập trước.");
            return;
        }

        statusMsg.innerText = "Đang lấy thông tin...";
        
        try {
            const response = await fetch(`${API_URL}/me`, {
                method: "GET",
                headers: {
                    // Đây là cách trình duyệt "đeo thẻ VIP" gửi lên cho Spring Security
                    "Authorization": `Bearer ${token}` 
                }
            });

            const data = await response.json();

            if (response.ok) {
                statusMsg.innerText = "✅ Lấy thông tin thành công!";
                statusMsg.style.color = "green";
                // In thông tin user ra màn hình
                consoleOut.innerText = "Xin chào: " + data.name + "\nVai trò: " + data.role + "\nEmail: " + data.email;
            } else {
                statusMsg.innerText = "❌ Token đã hết hạn hoặc không hợp lệ!";
                statusMsg.style.color = "red";
                // Nếu lỗi 401, xóa token cũ đi
                localStorage.removeItem("accessToken"); 
            }
        } catch (error) {
            consoleOut.innerText = "Lỗi kết nối: " + error;
        }
    }
</script>

</body>
</html>
