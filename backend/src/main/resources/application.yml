spring:
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=SEAL;encrypt=true;trustServerCertificate=true
    username: sa
    password: 12345

  jpa:
    hibernate:
      ddl-auto: none  # RẤT QUAN TRỌNG: Để Flyway làm việc, đừng để hibernate tự sửa bảng
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.SQLServerDialect

  flyway:
    enabled: true

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG