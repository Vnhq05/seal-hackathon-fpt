# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
  
  # ===============================
  # DATABASE & DATASOURCE
  # ===============================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SEAL;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=12345
  
  # ===============================
  # JPA / HIBERNATE
  # ===============================
  # RẤT QUAN TRỌNG: Để Flyway làm việc, đừng để hibernate tự sửa bảng
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
  
  # ===============================
  # FLYWAY
  # ===============================
spring.flyway.enabled=true
  
  # ===============================
  # LOGGING
  # ===============================
logging.level.org.springframework.security=DEBUG
  
  # ===============================
  # JWT SECURITY
  # ===============================
  # Chuỗi secret key này phải dài ít nhất 256-bit (32 ký tự). Hãy giữ bí mật chuỗi này!
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  # Thời gian sống của Access Token (Ví dụ: 1 ngày = 86400000 ms)
application.security.jwt.expiration=86400000
  # Thời gian sống của Refresh Token (Ví dụ: 7 ngày = 604800000 ms)
application.security.jwt.refresh-token.expiration=604800000
  
  # ===============================
  # CẤU HÌNH ADMIN MẶC ĐỊNH (SEEDER)
  # ===============================
app.seeder.admin.name=Admin Local Test
app.seeder.admin.email=admin@fpt.edu.vn
app.seeder.admin.password=123
  # ===============================
  # CẤU HÌNH ẨN SWAGGER
  # ===============================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

